<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FTC Sim - Setup</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 10px; display: inline-block; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 90%; margin: 10px 0; padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 6px; }
        button { width: 95%; padding: 12px; background: #ffae00; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        #preview { width: 100px; height: 100px; border: 1px solid #555; margin: 10px; object-fit: contain; background: #000; }
        label { display: block; font-size: 0.8em; color: #bbb; text-align: left; margin-left: 5%; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Robot & Field Setup</h2>
    
    <label>Robot Sprite (Auto-rotated)</label>
    <input type="file" id="robotFile" accept="image/*">
    <img id="preview" src="" alt="Robot Preview">

    <canvas id="rotator"></canvas>

    <div style="display:flex; gap:5px; padding:0 10px;">
        <div style="flex:1"><label>Width (in)</label><input type="number" id="w" value="18"></div>
        <div style="flex:1"><label>Length (in)</label><input type="number" id="l" value="18"></div>
    </div>

    <label>Select Field Layout</label>
    <select id="fieldSelect">
        <option value="image.png">Option 1 (Default)</option>
        </select>

    <button onclick="launch()">Launch Simulation</button>
</div>

<script>
    const fileInput = document.getElementById('robotFile');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('rotator');
    const ctx = canvas.getContext('2d');
    
    let finalImgData = "";

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                canvas.width = img.height;
                canvas.height = img.width;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(Math.PI / 2);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                finalImgData = canvas.toDataURL("image/png");
                preview.src = finalImgData;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function launch() {
        const config = {
            robotWidthInches: parseFloat(document.getElementById('w').value),
            robotLengthInches: parseFloat(document.getElementById('l').value),
            selectedField: document.getElementById('fieldSelect').value,
            customRobotImg: finalImgData
        };
        localStorage.setItem('ftc_user_config', JSON.stringify(config));
        window.location.href = 'run.html';
    }
</script>

</body>
</html>
