<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FTC Sim - Setup</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 30px; }
        .card { background: #2a2a2a; padding: 25px; border-radius: 12px; display: inline-block; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8em; color: #aaa; margin-bottom: 4px; margin-left: 2px; }
        input, select { width: 100%; padding: 10px; background: #111; color: #ffae00; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; font-weight: bold; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: #ffae00; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 15px; font-size: 1em; }
        button:hover { background: #ffd000; }
        #preview { width: 80px; height: 80px; border: 2px dashed #444; margin: 10px auto; display: block; object-fit: contain; background: #000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #ffae00; margin-top: 0;">Simulation Setup</h2>
    
    <div class="group">
        <label>Robot Sprite</label>
        <input type="file" id="robotFile" accept="image/*">
        <img id="preview" src="" alt="Robot Preview">
    </div>

    <canvas id="rotator"></canvas>

    <div class="row">
        <div class="group" style="flex:1"><label>Width (in)</label><input type="number" id="w" value="18"></div>
        <div class="group" style="flex:1"><label>Length (in)</label><input type="number" id="l" value="18"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0;">

    <div class="row">
        <div class="group" style="flex:1"><label>Start X (in)</label><input type="number" id="startX" value="0"></div>
        <div class="group" style="flex:1"><label>Start Y (in)</label><input type="number" id="startY" value="0"></div>
    </div>

    <div class="group">
        <label>Start Angle (Degrees: -90 is Up, 0 is Right)</label>
        <input type="number" id="startAngle" value="0">
    </div>

    <div class="group">
        <label>Select Field</label>
        <select id="fieldSelect">
            <option value="image.png">Option 1 (Default)</option>
        </select>
    </div>

    <button onclick="launch()">Launch Simulation ▶</button>
</div>

<script>
    const fileInput = document.getElementById('robotFile');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('rotator');
    const ctx = canvas.getContext('2d');
    
    let finalImgData = "";

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                canvas.width = img.height;
                canvas.height = img.width;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(Math.PI / 2);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                finalImgData = canvas.toDataURL("image/png");
                preview.src = finalImgData;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function launch() {
        const config = {
            robotWidthInches: parseFloat(document.getElementById('w').value),
            robotLengthInches: parseFloat(document.getElementById('l').value),
            startX: parseFloat(document.getElementById('startX').value),
            startY: parseFloat(document.getElementById('startY').value),
            startAngle: parseFloat(document.getElementById('startAngle').value - 90),
            selectedField: document.getElementById('fieldSelect').value,
            customRobotImg: finalImgData,
            defaultLanguage: "java"
        };
        localStorage.setItem('ftc_user_config', JSON.stringify(config));
        window.location.href = 'run.html';
    }
</script>

</body>
</html>
