<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FTC Robot Simulator</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #1a1a1a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    canvas {
      border: 4px solid #333;
      background-color: black;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .controls {
      margin-top: 20px;
    }

    textarea {
      background-color: #111;
      color: #0f0;
      font-family: 'Courier New', monospace;
      padding: 15px;
      width: 600px;
      height: 200px;
      border: 1px solid #444;
      border-radius: 8px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      cursor: pointer;
      background: #ffae00;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #ffd000;
    }

    #pauseBtn {
      background: #444;
      color: white;
    }
  </style>
</head>

<body>

<h1>FTC Robot Simulator</h1>

<canvas id="game" width="800" height="600"></canvas>

<div class="controls">
  <textarea id="code">
// Autonomous Code
for(int i = 0; i < 4; i++) {
  forward(24);
  turn(90);
}
  </textarea>

  <br>
  <button onclick="runCode()">▶ Run Autonomous</button>
  <button onclick="togglePause()" id="pauseBtn">Pause</button>
</div>

<script src="script.js"></script>

</body>
</html>
